name: Sync elevi.json from Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate elevi.json from Google Sheets
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: node tools/sync-elevi-from-sheet.mjs

      - name: Show generated elevi.json preview
        run: |
          echo "Generated elevi.json:"
          cat elevi.json

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet elevi.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in elevi.json."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in elevi.json."
            git diff -- elevi.json
          fi

      - name: Commit and push elevi.json
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add elevi.json
          git commit -m "Sync elevi.json from Google Sheets"
          git push
